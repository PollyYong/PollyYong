name: Generate repositories graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate repositories SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          python - <<'PY'
          import os
          import json
          import math
          import urllib.request
          from collections import Counter
          from datetime import datetime, date
          from pathlib import Path

          username = os.environ.get("USERNAME", "")
          token = os.environ.get("GITHUB_TOKEN", "")

          if not username:
              raise SystemExit("USERNAME is required")

          headers = {"Accept": "application/vnd.github+json"}
          if token:
              headers["Authorization"] = f"Bearer {token}"

          repos = []
          page = 1
          while True:
              req = urllib.request.Request(
                  f"https://api.github.com/users/{username}/repos?per_page=100&page={page}&sort=created&direction=asc",
                  headers=headers,
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  batch = json.load(resp)
              if not batch:
                  break
              repos.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          if not repos:
              raise SystemExit("No repositories found")

          created_dates = []
          for repo in repos:
              created_at = repo.get("created_at")
              if created_at:
                  created_dates.append(datetime.fromisoformat(created_at.replace("Z", "+00:00")).date())

          if not created_dates:
              raise SystemExit("No created dates found")

          month_counts = Counter(d.replace(day=1) for d in created_dates)
          if not month_counts:
              raise SystemExit("No monthly counts found")

          start_month = min(month_counts)
          end_month = max(month_counts)

          months = []
          current = start_month
          while current <= end_month:
              months.append(current)
              if current.month == 12:
                  current = current.replace(year=current.year + 1, month=1)
              else:
                  current = current.replace(month=current.month + 1)

          cumulative = 0
          values = []
          for month in months:
              cumulative += month_counts.get(month, 0)
              values.append(cumulative)

          width, height = 900, 320
          margin_left, margin_right = 60, 30
          margin_top, margin_bottom = 40, 50
          plot_w = width - margin_left - margin_right
          plot_h = height - margin_top - margin_bottom

          max_value = max(values) if values else 1
          min_value = min(values) if values else 0
          if max_value == min_value:
              max_value += 1

          def x_for(i):
              return margin_left + (i / max(1, len(months) - 1)) * plot_w

          def y_for(v):
              return margin_top + plot_h - ((v - min_value) / (max_value - min_value)) * plot_h

          svg_parts = [
              f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">',
              '<rect width="100%" height="100%" fill="#0d1117"/>',
              '<text x="40" y="28" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="20">Repositories over time</text>',
          ]

          # axes
          svg_parts.append(f'<line x1="{margin_left}" y1="{margin_top + plot_h}" x2="{margin_left}" y2="{margin_top}" stroke="#58a6ff" stroke-width="1.5"/>')
          svg_parts.append(f'<line x1="{margin_left}" y1="{margin_top + plot_h}" x2="{width - margin_right}" y2="{margin_top + plot_h}" stroke="#58a6ff" stroke-width="1.5"/>')

          # grid lines
          for step in range(4):
              y = margin_top + (plot_h / 3) * step
              svg_parts.append(f'<line x1="{margin_left}" y1="{y}" x2="{width - margin_right}" y2="{y}" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>')

          # line path
          points = []
          for i, v in enumerate(values):
              points.append(f"{x_for(i)},{y_for(v)}")
          path_d = "M " + " L ".join(points)
          svg_parts.append(f'<path d="{path_d}" fill="none" stroke="#7c3aed" stroke-width="3"/>')

          # points
          for i, v in enumerate(values):
              x = x_for(i)
              y = y_for(v)
              svg_parts.append(f'<circle cx="{x}" cy="{y}" r="4" fill="#58a6ff"/>')

          # month labels
          for i, month in enumerate(months):
              if i % max(1, len(months) // 6) == 0 or i == len(months) - 1:
                  x = x_for(i)
                  label = month.strftime("%b %Y")
                  svg_parts.append(f'<text x="{x}" y="{height - 18}" fill="#8b949e" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">{label}</text>')

          svg_parts.append('</svg>')
          output_path = Path("dist/repositories.svg")
          output_path.parent.mkdir(exist_ok=True)
          output_path.write_text("\n".join(svg_parts), encoding="utf-8")
          print(f"Wrote {output_path}")
          PY

      - name: Publish graph to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: repositories-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}